[workspace]
changelog_update = false          # Disable changelog for all packages by default
git_release_enable = false        # Disable git releases for all packages by default
git_tag_enable = false            # Disable git tags for all packages by default
pr_branch_prefix = "release-plz/" # PR branch prefix
pr_name = "chore(release): publish v{{ version }}"
pr_labels = ["release"]           # add the `release` label to the release Pull Request

# Only the main binary package gets a tag, release, and changelog entry.
[[package]]
name = "bitrouter"
changelog_path = "CHANGELOG.md" # Single changelog at the repository root
changelog_update = true
changelog_include = [           # Include commits from all sub-crates in the bitrouter changelog
    "bitrouter-core",
    "bitrouter-providers",
    "bitrouter-config",
    "bitrouter-api",
    "bitrouter-guardrails",
]
git_tag_name = "v{{ version }}"     # Customize the git tag name (e.g. v0.1.5 instead of bitrouter-v0.1.5)
git_release_name = "v{{ version }}" # Match the tag name for the GitHub release title
git_tag_enable = true                # Enable git tags for this package
git_release_enable = true            # Enable git releases for this package

[changelog]
header = """# Changelog

## [Unreleased]
"""
trim = true

body = """
{%- macro print_commit(commit) -%}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }} - ([{{ commit.id | truncate(length=7, end="") }}]({{ remote.link }}/commit/{{ commit.id }}))
{%- endmacro %}

{%- if version %}
{% if previous.version %}## [{{ version }}]({{ release_link }})
{% else %}## [{{ version }}]
{% endif %}

{% for group, commits in commits
| filter(attribute="merge_commit", value=false)
| unique(attribute="message")
| group_by(attribute="group") %}### {{ group | striptags | trim | upper_first }}

{% for commit in commits | filter(attribute="scope") | sort(attribute="scope") %}{{ self::print_commit(commit=commit) }}
{% endfor %}{% for commit in commits %}{% if not commit.scope %}{{ self::print_commit(commit=commit) }}
{% endif %}{% endfor %}
{% endfor %}{% endif %}
"""

commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->⛰️ Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^doc", group = "<!-- 3 -->📚 Documentation" },
  { message = "^perf", group = "<!-- 4 -->⚡ Performance" },
  { message = "^refactor\\(clippy\\)", skip = true },
  { message = "^refactor", group = "<!-- 2 -->🚜 Refactor" },
  { message = "^style", group = "<!-- 5 -->🎨 Styling" },
  { message = "^test", group = "<!-- 6 -->🧪 Testing" },
  { message = "^chore\\(release\\):", skip = true },
  { message = "^chore: release", skip = true },
  { message = "^chore\\(deps.*\\)", skip = true },
  { message = "^chore\\(pr\\)", skip = true },
  { message = "^chore\\(pull\\)", skip = true },
  { message = "^chore\\(npm\\).*yarn\\.lock", skip = true },
  { message = "^chore|^ci", group = "<!-- 7 -->⚙️ Miscellaneous Tasks" },
  { body = ".*security", group = "<!-- 8 -->🛡️ Security" },
  { message = "^revert", group = "<!-- 9 -->◀️ Revert" },
]
link_parsers = [
  { pattern = "#(\\d+)", href = "{{ remote.link }}/issues/$1" },
  { pattern = "RFC(\\d+)", text = "ietf-rfc$1", href = "https://datatracker.ietf.org/doc/html/rfc$1" },
]
