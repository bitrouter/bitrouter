# Local demo config for the Chainlink Confidential Inference bridge.
#
# Foreground (logs to stdout):
#   cargo run -p bitrouter --features chainlink-demo -- \
#       serve -c crates/bitrouter-chainlink/examples/chainlink.yaml
#
# Background daemon:
#   cargo run -p bitrouter --features chainlink-demo -- \
#       start -c crates/bitrouter-chainlink/examples/chainlink.yaml
#
# Requires:
#   export CHAINLINK_CONFIDENTIAL_API_KEY=<your hackathon key>
#
# MPP pay-per-request gate (optional, chainlink-demo build only):
#   Set MPP_SECRET_KEY to require an MPP payment on every POST to
#   /v1/chat/completions before inference runs. An unpaid request gets a 402
#   with a fresh Tempo charge challenge; a request echoing a verified
#   credential is admitted. Charges 0.001 USDC on Arc testnet (eip155:5042002)
#   to the agent-treasury address by default.
#
#   export MPP_SECRET_KEY=bitrouter-pay-secret
#   # optional overrides:
#   export MPP_RECIPIENT=0xBB4CB05dA6ED0780cFDd0F088EaEEd420381DE38
#   export MPP_AMOUNT=0.001
#
#   When MPP_SECRET_KEY is unset, the gate is disabled and requests are served
#   without payment (the default).

server:
  listen: "127.0.0.1:4356"
  skip_auth: true

providers:
  chainlink:
    api_base: "https://confidential-ai-dev-preview.cldev.cloud"
    api_key: "${CHAINLINK_CONFIDENTIAL_API_KEY}"
    api_protocol:
      - "*": chainlink_confidential
    models:
      - { id: gemma4 }
      - { id: "qwen3.6" }
