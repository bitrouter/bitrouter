[package]
name = "bitrouter-substrate"
description = "Per-session ACP substrate: one session, one agent, turn queue + worktree"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
bitrouter-sdk = { workspace = true, features = ["acp"] }
agent-client-protocol = { workspace = true }
agent-client-protocol-schema = { workspace = true }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "sync", "macros", "process", "io-util"] }
tokio-stream = { workspace = true, features = ["sync"] }
tokio-util = { workspace = true, features = ["compat"] }
futures.workspace = true
async-trait.workspace = true
anyhow.workspace = true
thiserror.workspace = true
tracing.workspace = true
uuid.workspace = true
serde = { workspace = true }

[target.'cfg(unix)'.dependencies]
# `killpg` for whole-process-tree teardown of npx-style agent wrappers.
libc = "0.2"

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "test-util", "fs"] }
tempfile.workspace = true
