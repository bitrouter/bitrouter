# Anthropic — `x-api-key` header + pinned `anthropic-version`.
#
# Official auth + versioning docs:
# - https://docs.anthropic.com/en/api/getting-started
#   ("All requests must include an `x-api-key` header with your API key")
# - https://docs.anthropic.com/en/api/versioning
#   ("All API requests must include an `anthropic-version` header"; the
#   `2023-06-01` value is the only released revision as of 2026-05).
# - https://docs.anthropic.com/en/api/messages
#   (Messages endpoint — `POST {api_base}/messages`)
#
# `anthropic-version` lives in `extra_headers` so it travels with auth — the
# upstream rejects requests that omit it.

id = "anthropic"
display_name = "Anthropic"
api_base = "https://api.anthropic.com/v1"
api_protocol = "messages"
doc_url = "https://docs.anthropic.com/en/api/messages"

[auth]
kind = "header"
header = "x-api-key"
env = "ANTHROPIC_API_KEY"

[auth.extra_headers]
"anthropic-version" = "2023-06-01"
