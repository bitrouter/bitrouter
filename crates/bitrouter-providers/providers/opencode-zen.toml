# opencode-zen — pay-as-you-go gateway from the opencode.ai team. Serves
# models from multiple vendors behind one credential; each model is
# proxied with its native wire protocol.
#
# Official docs:
# - https://opencode.ai/docs/zen/ (overview, account / billing setup)
# - The HTTP base URL is `https://opencode.ai/zen/v1/`; per-protocol
#   endpoints are appended by the SDK:
#     openai     → /chat/completions
#     responses  → /responses           (GPT models)
#     anthropic  → /messages            (Claude models)
#     google     → /models/<id>:<verb>  (Gemini models)
#
# Auth header / env var: the public docs don't show a curl snippet, but
# the gateway follows the standard `Authorization: Bearer <key>` shape
# of every OpenAI-compatible endpoint, with the key sourced from
# `OPENCODE_ZEN_API_KEY`. opencode-go shares the same key (see
# providers/opencode-go.toml).

id = "opencode-zen"
display_name = "opencode zen"
api_base = "https://opencode.ai/zen/v1"
doc_url = "https://opencode.ai/docs/zen/"

# Per-model protocol map. Pattern keys match the catalog ids
# advertised by the gateway's `/models` endpoint
# (`opencode/<vendor-prefixed-name>`). Longest match wins.
[api_protocol]
"opencode/gpt-*" = "responses"
"opencode/claude-*" = "messages"
"opencode/gemini-*" = "generate_content"
"*" = "chat_completions"

[auth]
kind = "bearer"
env = "OPENCODE_ZEN_API_KEY"
