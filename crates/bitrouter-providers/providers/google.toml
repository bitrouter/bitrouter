# Google — Generative Language API. `x-goog-api-key` header.
#
# Official auth + endpoint docs:
# - https://ai.google.dev/gemini-api/docs/api-key
#   ("You can pass the API key with the `x-goog-api-key` HTTP header.")
# - https://ai.google.dev/api/generate-content
#   (`POST https://generativelanguage.googleapis.com/v1beta/{model}:generateContent`)
# - https://ai.google.dev/api/generate-content#method:-models.streamgeneratecontent
#   (streaming endpoint — verb is in the URL path; the Transport handles it)
#
# `GEMINI_API_KEY` matches the upstream's own SDK env-var convention; users
# who set `GOOGLE_API_KEY` for other Google products can override via their
# `bitrouter.yaml`.

id = "google"
display_name = "Generate Content"
api_base = "https://generativelanguage.googleapis.com/v1beta"
api_protocol = "generate_content"
doc_url = "https://ai.google.dev/api"

[auth]
kind = "header"
header = "x-goog-api-key"
env = "GEMINI_API_KEY"
