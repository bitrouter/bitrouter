# opencode-go — flat-rate subscription tier from the opencode.ai team.
# Sister gateway to opencode-zen with a different api_base and model
# catalog; both authenticate with the same `OPENCODE_ZEN_API_KEY` (the
# subscription is purchased through the same opencode account, so
# there's only one key to manage).
#
# Official docs:
# - https://opencode.ai/docs/go/ (model catalog, subscription tiers)
# - HTTP base URL is `https://opencode.ai/zen/go/v1/`; per-protocol
#   endpoints are appended by the SDK:
#     openai     → /chat/completions   (default for all but MiniMax)
#     anthropic  → /messages           (MiniMax models)

id = "opencode-go"
display_name = "opencode go"
api_base = "https://opencode.ai/zen/go/v1"
doc_url = "https://opencode.ai/docs/go/"

# Per-model protocol map. Pattern keys match the catalog ids
# advertised by the gateway's `/models` endpoint
# (`opencode-go/<vendor-prefixed-name>`). Longest match wins.
[api_protocol]
"opencode-go/minimax-*" = "messages"
"*" = "chat_completions"

[auth]
kind = "bearer"
env = "OPENCODE_ZEN_API_KEY"
