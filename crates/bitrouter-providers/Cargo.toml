[package]
name = "bitrouter-providers"
description = "Compiled-in provider catalog (auth + protocol mapping) for bitrouter — one TOML per built-in provider."
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true

[features]
# Browser-based OAuth Authorization Code flow + PKCE — drives the
# interactive subscription logins (`bitrouter providers login claude-code`,
# `bitrouter providers login openai-codex`). Off by default so library consumers of
# `bitrouter-providers` (`bitrouter-cloud`, downstream crates) don't pull
# `sha2` / `base64` / `rand` they don't use. `apps/bitrouter` enables it.
default = []
pkce = ["dep:sha2", "dep:base64", "dep:rand", "dep:url", "dep:keyring", "tokio/net", "tokio/io-util", "tokio/sync"]

[dependencies]
# `config_file` for `bitrouter_sdk::config::{Config, ProviderConfig, PatternMap}`
# — used by `apply_builtin_defaults` to fill in a parsed user config.
bitrouter-sdk = { workspace = true, features = ["config_file"] }

async-trait.workspace = true
reqwest.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
toml.workspace = true
tracing.workspace = true
tokio = { workspace = true, optional = true }

# `pkce`-only deps — all four quarantined behind the feature gate. `sha2`
# and `base64` build the PKCE S256 challenge; `rand` produces the verifier
# and `state` nonce; `url` handles the loopback redirect URL.
sha2 = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
rand = { workspace = true, optional = true }
url = { workspace = true, optional = true }
# Cross-platform OS keyring — reads the Antigravity `agy` session. Gated with
# the rest of the interactive-login deps behind `pkce`.
keyring = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread", "net", "io-util", "sync"] }
wiremock = "0.6"
