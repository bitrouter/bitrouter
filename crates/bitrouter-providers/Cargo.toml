[package]
name = "bitrouter-providers"
description = "Compiled-in provider catalog (auth + protocol mapping) for bitrouter — one TOML per built-in provider."
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
# `config_file` for `bitrouter_sdk::config::{Config, ProviderConfig, PatternMap}`
# — used by `apply_builtin_defaults` to fill in a parsed user config.
bitrouter-sdk = { workspace = true, features = ["config_file"] }

async-trait.workspace = true
reqwest.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
toml.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
wiremock = "0.6"
