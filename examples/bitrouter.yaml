# yaml-language-server: $schema=../schemas/bitrouter.config.schema.json
#
# Example bitrouter.yaml — a committed, version-controlled IaC config.
#
# Secrets are written as environment-variable placeholders (see api_key below)
# and resolved from the environment at load time; they never live in the
# committed file. Validate this file in CI with:
#
#     bitrouter config validate -c examples/bitrouter.yaml
#
# The `# yaml-language-server` header above gives IDEs autocomplete + inline
# validation against the JSON Schema. This in-repo example points at the
# committed schema by relative path; a config in your own repo should instead
# pin the published URL, e.g.
#   # yaml-language-server: $schema=https://bitrouter.dev/schema/v<VERSION>/config.schema.json

server:
  # Loopback by default; set 0.0.0.0 only when you intend to expose the router
  # on all interfaces.
  listen: 127.0.0.1:4356
  log_level: info

providers:
  openai:
    api_base: https://api.openai.com/v1
    api_key: ${OPENAI_API_KEY}
    models:
      - id: gpt-4o

  anthropic:
    api_base: https://api.anthropic.com
    api_key: ${ANTHROPIC_API_KEY}
    # `api_protocol` is a glob-prefix pattern list: the head of each set is the
    # preferred outbound protocol.
    api_protocol:
      - "*": messages
    models:
      - id: claude-sonnet-4-6

# A virtual model that fails over from one provider to another in declared
# order (the default `priority` strategy).
models:
  smart:
    strategy: priority
    endpoints:
      - provider: anthropic
        service_id: claude-sonnet-4-6
      - provider: openai
        service_id: gpt-4o

# Config-driven per-request model routing. An ingress transform fingerprints
# each request by its agent-loop step and rewrites the model to the tier the
# table assigns, so a long agent loop can spend a capable model only where it
# matters and a cheaper one on routine steps — without the caller changing how
# it addresses the router. Inert unless `tiers` is non-empty.
policy_table:
  # Tier name -> the model id requests on that tier route to. Each value is a
  # `provider:model` direct route here; a bare canonical id (resolved via the
  # cascade) works too.
  tiers:
    cheap: openai:gpt-4o
    capable: anthropic:claude-sonnet-4-6
  # Agent-loop step -> tier. `opening` is the first turn (no model reply yet);
  # `after_<tool>` means the model's most recent call was to `<tool>`.
  fingerprints:
    opening: capable # set up the task on the capable tier
    after_read_file: cheap # summarising a file read is routine — downgrade
  # Any fingerprint not listed above.
  default_tier: capable
  # Hard guardrail: a request carrying tools is clamped up to this tier unless
  # the tier it would otherwise get is listed in `tool_safe_tiers`.
  tool_use_tier: capable
  tool_safe_tiers:
    - capable
  # Online adequacy learning (off by default). When enabled, the daemon watches
  # every request a downgrade produced and, after `escalation_threshold` hard
  # failures, pins that fingerprint to `escalation_tier` (here `capable`) so the
  # downgrade self-corrects. A pin decays after `pin_cooldown_secs`, so a
  # transient failure is retried later. The learner only ever escalates a failing
  # downgrade — it never downgrades on its own.
  adequacy:
    enabled: false
    escalation_tier: capable
    escalation_threshold: 2
    pin_cooldown_secs: 1800
    # Aggressive downgrade *discovery* (off by default). When enabled, the daemon
    # periodically trials `explore_tier` on fingerprints the table routes to the
    # escalation tier (ones you did NOT downgrade) and locks a fingerprint to the
    # cheap tier once it survives `explore_threshold` trials — finding safe
    # downgrades automatically. A trial that fails escalates and stops, like the
    # safety path. This routes some of your capable-tier traffic to the cheap tier
    # speculatively, so it is the aggressive knob.
    explore_enabled: false
    explore_tier: cheap
    explore_interval: 5
    explore_threshold: 3
