# Meta Superintelligence Labs' proprietary, closed-weight frontier model, served
# through the Meta Model API (see providers/meta-ai.yaml). muse-spark-1.1 accepts
# text, image, video, and PDF and generates text. Only text/image are recorded as
# input_modalities (the catalog enum covers text/image/audio); video and PDF input
# are expressed on the provider as the video_input / file_input capabilities.
- id: meta/muse-spark-1.1
  name: 'Meta: Muse Spark 1.1'
  input_modalities:
  - text
  - image
  output_modalities:
  - text
  max_input_tokens: 1048576
  max_output_tokens: 32000
  release_date: 2026-07-09
  open_weights: false
  family: muse-spark
