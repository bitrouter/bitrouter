# Meta Model API — Meta's self-serve, per-token API for its proprietary Muse Spark
# family (public preview, US-only at launch). A single host speaks the OpenAI Chat
# Completions and Responses formats plus the Anthropic Messages format.
#
# muse-spark-1.1 is multimodal (text/image/video/PDF in, text out); the video and
# PDF paths are recorded as the video_input / file_input capabilities because the
# model catalog's input_modalities enum only covers text/image/audio.
name: meta-ai
display_name: Meta Model API
metadata:
  headquarters: US
  name: Meta
  privacy_policy_url: https://www.facebook.com/about/privacy/
  slug: meta
  terms_of_service_url: https://www.facebook.com/policies/
kind: first_party
api_base: https://api.meta.ai/v1
doc_url: https://dev.meta.ai/docs/getting-started/overview
api_protocol:
  - "*": [openai, responses, anthropic]
# Free-tier baseline. The Paid tier raises these to 3000 RPM / 4,000,000 TPM.
# Limits are shared per team, not per API key.
rate_limits:
  - "*":
      requests_per_minute: 60
      tokens_per_minute: 2000000
models:
  - id: meta/muse-spark-1.1
    provider_model_id: muse-spark-1.1
    # Pricing per 1M tokens from Meta's catalog; no long-context premium. Web
    # search grounding is billed separately at $2.50 per 1k queries.
    pricing:
      input_tokens:
        no_cache: 1.25
        cache_read: 0.15
      output_tokens:
        text: 4.25
    capabilities:
      - reasoning
      - tools
      - structured_outputs
      - image_input
      - video_input
      - file_input
      - web_search
status: active
weight: 1
submitted_at: 2026-07-09
auth:
  kind: bearer
  env: META_API_KEY
auto_sync:
  feed: models_dev
  key: meta
