name: aws-bedrock
display_name: Amazon Bedrock
metadata:
  headquarters: US
  name: Amazon Web Services
  privacy_policy_url: https://aws.amazon.com/privacy/
  slug: amazon-bedrock
  status_page_url: https://health.aws.amazon.com/health/status
  terms_of_service_url: https://aws.amazon.com/service-terms/
kind: first_party
# Amazon Bedrock via its OpenAI-compatible `bedrock-mantle` endpoints (Chat
# Completions + Responses) over SSE, authenticated with a Bedrock API key
# (bearer, `AWS_BEARER_TOKEN_BEDROCK`). The region defaults to us-east-1;
# override with AWS_REGION. This replaces the removed `bitrouter-bedrock` crate:
# Bedrock's native Converse API frames streams as a binary event-stream (needs
# the AWS SDK), but the mantle endpoints are plain HTTP+JSON+SSE, so Bedrock is
# an ordinary registry provider now. Capabilities that only exist on the native
# `bedrock-runtime` API — cross-region inference profiles, Guardrails,
# structured outputs, and any model not yet on mantle — are not served here.
api_protocol:
  - "*": [openai, responses]
rate_limits:
  - "*":
      requests_per_minute: 60
api_base: https://bedrock-mantle.${AWS_REGION:-us-east-1}.api.aws/v1
doc_url: https://docs.aws.amazon.com/bedrock/latest/userguide/bedrock-mantle.html
auth:
  kind: bearer
  env: AWS_BEARER_TOKEN_BEDROCK
status: active
weight: 1
submitted_at: 2026-07-06
