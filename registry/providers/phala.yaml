kind: gateway
# Phala Cloud confidential (GPU-TEE) inference gateway. OpenAI-compatible; USD
# pricing per 1M tokens (no cached-input tier). Distinct from the `redpill`
# provider: RedPill is an aggregator that ROUTES to Phala among others, while
# this is Phala's direct inference host (inference.phala.com). Manual provider —
# not in models.dev. Prices from per-model pages (phala.com/models/...).
# VERIFY: exact served model ids via GET https://inference.phala.com/v1/models
# (the catalog uses vendor-prefixed ids; older docs show phala/ dev ids).
