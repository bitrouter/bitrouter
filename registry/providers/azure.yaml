name: azure
display_name: Azure OpenAI
metadata:
  headquarters: US
  name: Microsoft Azure
  privacy_policy_url: https://privacy.microsoft.com/privacystatement
  slug: azure
  status_page_url: https://azure.status.microsoft
  terms_of_service_url: https://azure.microsoft.com/support/legal/
kind: first_party
# Azure OpenAI via its OpenAI-compatible `/openai/v1` surface (Chat Completions
# + Responses) over SSE. Set AZURE_OPENAI_RESOURCE to your resource name and
# AZURE_OPENAI_API_KEY to a key. The v1 surface is OpenAI-SDK compatible and
# accepts the key as a bearer token (exactly what the OpenAI SDK sends), so no
# `api-version` query or per-deployment path is needed — and a Microsoft Entra
# ID (AAD) access token works in the same `Authorization: Bearer` slot. If the
# resource var is unset, the provider drops out of routing (no valid base URL).
api_protocol:
  - "*": [openai, responses]
rate_limits:
  - "*":
      requests_per_minute: 60
api_base: https://${AZURE_OPENAI_RESOURCE}.openai.azure.com/openai/v1
doc_url: https://learn.microsoft.com/azure/ai-services/openai/reference-preview
auth:
  kind: bearer
  env: AZURE_OPENAI_API_KEY
status: active
