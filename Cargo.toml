[workspace]
resolver = "3"
members = ["crates/*", "plugins/*", "apps/*"]

[workspace.package]
version = "1.0.0-alpha.1"
edition = "2024"
license = "Apache-2.0"
authors = ["Archer <archer@bitrouter.ai>"]
repository = "https://github.com/bitrouter/bitrouter"
rust-version = "1.85"

[workspace.dependencies]
# internal crates
bitrouter-sdk = { path = "crates/bitrouter-sdk", version = "1.0.0-alpha.1", default-features = false }
bitrouter-bedrock = { path = "crates/bitrouter-bedrock", version = "1.0.0-alpha.1" }
bitrouter-auth = { path = "plugins/bitrouter-auth", version = "1.0.0-alpha.1" }
bitrouter-policy = { path = "plugins/bitrouter-policy", version = "1.0.0-alpha.1" }
bitrouter-settlement = { path = "plugins/bitrouter-settlement", version = "1.0.0-alpha.1", default-features = false }
bitrouter-guardrails = { path = "plugins/bitrouter-guardrails", version = "1.0.0-alpha.1" }
bitrouter-observe = { path = "plugins/bitrouter-observe", version = "1.0.0-alpha.1", default-features = false }

# shared third-party
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
futures = "0.3"
futures-core = "0.3"
tokio = { version = "1", default-features = false }
tokio-stream = "0.1"
tokio-util = "0.7"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
http = "1"
bytes = "1"
pin-project-lite = "0.2"
async-stream = "0.3"

# http server (sdk `server` feature)
axum = { version = "0.8", features = ["json"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["trace"] }

# http client
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
eventsource-stream = "0.2"

# config (sdk `config_file` feature)
serde-saphyr = "0.0.26"

# database (settlement plugin)
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio", "macros", "chrono"] }

# crypto / encoding
sha2 = "0.10"
base64 = "0.22"
rand = "0.9"
hex = "0.4"
chrono = { version = "0.4", default-features = false, features = ["std", "clock", "serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
regex = "1"

# cli / tui
clap = { version = "4", features = ["derive"] }
ratatui = "0.29"
crossterm = "0.28"

[profile.release]
lto = "thin"

# The profile that `dist` builds release artifacts under (see dist-workspace.toml).
[profile.dist]
inherits = "release"
lto = "thin"
