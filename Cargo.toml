[workspace]
resolver = "3"
members = ["bitrouter", "bitrouter-*"]

[workspace.package]
version = "0.18.0"

# Config for 'cargo dist'
[workspace.metadata.dist]
# The preferred cargo-dist version to use in CI
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "npm", "homebrew"]
# npm scope for the npm installer
npm-scope = "@bitrouter"
# Don't create a GitHub release (release-plz already does this)
create-release = false
# Target platforms to build for
targets = [
    "aarch64-unknown-linux-gnu",
    "aarch64-unknown-linux-musl",
    "aarch64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "x86_64-apple-darwin",
    "aarch64-pc-windows-msvc",
    "x86_64-pc-windows-msvc",
]
# Homebrew tap repository
tap = "bitrouter/homebrew-tap"
# Publish to npm and Homebrew
publish-jobs = ["npm", "homebrew"]
# Whether to auto-include files like READMEs, LICENSEs, and CHANGELOGs
auto-includes = false
# Don't error on modified CI files (we customize the trigger for release-plz compatibility)
allow-dirty = ["ci"]

# The profile that 'cargo dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
