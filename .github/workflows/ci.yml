name: CI

on:
  push:
    branches: ["v1", "main"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - run: cargo clippy --workspace --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --all-features

  feature-isolation:
    name: feature-isolation
    runs-on: ubuntu-latest
    # Verifies plugins do not pull the axum HTTP stack under default features.
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo check -p bitrouter-settlement --no-default-features
      - run: cargo check -p bitrouter-sdk --no-default-features
      - name: assert axum not in plugin dep tree
        run: |
          if cargo tree -p bitrouter-settlement -i axum 2>/dev/null | grep -q axum; then
            echo "::error::bitrouter-settlement must not depend on axum"
            exit 1
          fi

  msrv:
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.85"
      - run: cargo check --workspace

  doc:
    name: doc
    runs-on: ubuntu-latest
    # Build rustdoc for the whole workspace under -D warnings: any broken
    # intra-doc link or missing-docs warning becomes a CI failure. Matches
    # what docs.rs will run.
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo doc --workspace --all-features --no-deps

  doctest:
    name: doctest
    runs-on: ubuntu-latest
    # Compile and run every ``` example in rustdoc comments. The plain
    # `test` job uses nextest, which does not execute doctests, so they
    # need their own pass.
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test --doc --workspace --all-features
