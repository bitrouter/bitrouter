name: CI

on:
  push:
    branches: ["v1", "main"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Linux, macOS, and Windows are all first-class platforms — clippy and test
  # run on each, no "primary" OS. The daemon control surface in particular has
  # platform-specific code (Unix domain socket vs Windows named pipe, SIGHUP /
  # SIGTERM vs ctrl_c, kill vs taskkill) and the matrix catches a regression in
  # any one of them at PR time.
  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - run: cargo clippy --workspace --all-features --tests -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --all-features

  feature-isolation:
    name: feature-isolation
    runs-on: ubuntu-latest
    # Verifies the SDK builds without its `server` feature, and that the
    # hook plugins do not pull the axum HTTP stack into their dep tree —
    # plugins are hook libraries, not servers.
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo check -p bitrouter-sdk --no-default-features
      - run: cargo check -p bitrouter-guardrails
      - run: cargo check -p bitrouter-observe
      - name: assert axum not in plugin dep trees
        run: |
          for crate in bitrouter-guardrails bitrouter-observe; do
            if cargo tree -p "$crate" -i axum 2>/dev/null | grep -q '^axum'; then
              echo "::error::$crate must not depend on axum"
              exit 1
            fi
          done

  schema:
    name: schema
    runs-on: ubuntu-latest
    # Guards the IaC config contract: the committed JSON Schema must match the
    # serde structs, every committed example must validate, and the deprecated
    # `serde_yaml` / unsound `serde_yml` parsers must stay out of the graph.
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: schema is up to date with the config structs
        run: cargo xtask generate-schema --check
      - name: validate committed example configs
        run: |
          cargo build -p bitrouter
          shopt -s nullglob
          for f in examples/*.yaml examples/*.yml examples/*.json; do
            echo "validating $f"
            ./target/debug/bitrouter config validate -c "$f"
          done
      - name: no deprecated/unsound yaml parser in the graph
        run: |
          for crate in serde_yaml serde_yml; do
            if cargo tree -i "$crate" 2>/dev/null | grep -q "^$crate"; then
              echo "::error::$crate must not be in the dependency graph (RUSTSEC: deprecated/unsound)"
              cargo tree -i "$crate"
              exit 1
            fi
          done

  msrv:
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.88"
      - run: cargo check --workspace

  doc:
    name: doc
    runs-on: ubuntu-latest
    # Build rustdoc for the whole workspace under -D warnings: any broken
    # intra-doc link or missing-docs warning becomes a CI failure. Matches
    # what docs.rs will run.
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo doc --workspace --all-features --no-deps

  doctest:
    name: doctest
    runs-on: ubuntu-latest
    # Compile and run every ``` example in rustdoc comments. The plain
    # `test` job uses nextest, which does not execute doctests, so they
    # need their own pass.
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test --doc --workspace --all-features
