name: CI

on:
  push:
    branches: ["v1", "main"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Linux, macOS, and Windows are all first-class platforms — clippy and test
  # run on each, no "primary" OS. The daemon control surface in particular has
  # platform-specific code (Unix domain socket vs Windows named pipe, SIGHUP /
  # SIGTERM vs ctrl_c, kill vs taskkill) and the matrix catches a regression in
  # any one of them at PR time.
  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - run: cargo clippy --workspace --all-features --tests -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --all-features

  feature-isolation:
    name: feature-isolation
    runs-on: ubuntu-latest
    # Verifies the SDK builds without its `server` feature, and that the
    # hook plugins do not pull the axum HTTP stack into their dep tree —
    # plugins are hook libraries, not servers.
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo check -p bitrouter-sdk --no-default-features
      - run: cargo check -p bitrouter-guardrails
      - run: cargo check -p bitrouter-observe
      - name: assert axum not in plugin dep trees
        run: |
          for crate in bitrouter-guardrails bitrouter-observe; do
            if cargo tree -p "$crate" -i axum 2>/dev/null | grep -q '^axum'; then
              echo "::error::$crate must not depend on axum"
              exit 1
            fi
          done

  dist:
    name: dist
    runs-on: ubuntu-latest
    # Guards generated/committed artifacts: the config schema and registry dist
    # JSON must match the Rust source/YAML data, each benchmarks/ run's
    # results.json must match its report table and committed data/, and
    # deprecated YAML parsers must stay out of the graph.
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: generated dist is up to date
        run: cargo run -p dist-helper -- check
      - name: no deprecated/unsound yaml parser in the graph
        run: |
          for crate in serde_yaml serde_yml; do
            if cargo tree -i "$crate" 2>/dev/null | grep -q "^$crate"; then
              echo "::error::$crate must not be in the dependency graph (RUSTSEC: deprecated/unsound)"
              cargo tree -i "$crate"
              exit 1
            fi
          done

  msrv:
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.93"
      - run: cargo check --workspace --all-features

  doc:
    name: doc
    runs-on: ubuntu-latest
    # Build rustdoc for the whole workspace under -D warnings: any broken
    # intra-doc link or missing-docs warning becomes a CI failure. Matches
    # what docs.rs will run.
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo doc --workspace --all-features --no-deps

  doctest:
    name: doctest
    runs-on: ubuntu-latest
    # Compile and run every ``` example in rustdoc comments. The plain
    # `test` job uses nextest, which does not execute doctests, so they
    # need their own pass.
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test --doc --workspace --all-features

  agent-plugin:
    name: agent-plugin
    runs-on: ubuntu-latest
    # Validate the agent-plugin manifests (.claude-plugin/, .codex-plugin/)
    # against the real loaders. Two gates:
    #   1. Claude Code has a purpose-built validator — run it strict.
    #   2. Codex has NO validator and its loader warn-and-ignores broken
    #      manifests (a typo silently drops a component), so we exercise
    #      the real install path in an isolated CODEX_HOME and
    #      presence-assert the plugin actually loaded.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: claude plugin validate (strict)
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate . --strict
      - name: codex loader exercise (presence-asserted)
        run: |
          npm install -g @openai/codex
          export CODEX_HOME="$(mktemp -d)"
          codex plugin marketplace add "$PWD"
          codex plugin add bitrouter@bitrouter
          codex plugin list --json | tee /tmp/codex-plugins.json
          jq -e '.installed[] | select(.name == "bitrouter")' /tmp/codex-plugins.json
