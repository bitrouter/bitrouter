name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: stable / fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run cargo fmt
        run: cargo fmt -- --check

  clippy:
    name: stable / clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: clechasseur/rs-clippy-check@v6.0.0
        with:
          args: --all-features

  feature-build:
    name: stable / build / ${{ matrix.crate }} / ${{ matrix.feature_set }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: bitrouter
            feature_set: no-features
            cargo_args: --no-default-features
          - crate: bitrouter
            feature_set: tui
            cargo_args: --no-default-features --features tui
          - crate: bitrouter
            feature_set: all-features
            cargo_args: --all-features
          - crate: bitrouter-api
            feature_set: no-features
            cargo_args: --no-default-features
          - crate: bitrouter-api
            feature_set: openai
            cargo_args: --no-default-features --features openai
          - crate: bitrouter-api
            feature_set: anthropic
            cargo_args: --no-default-features --features anthropic
          - crate: bitrouter-api
            feature_set: google
            cargo_args: --no-default-features --features google
          - crate: bitrouter-api
            feature_set: all-features
            cargo_args: --all-features
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build crate
        run: cargo build -p ${{ matrix.crate }} ${{ matrix.cargo_args }}

  cross-platform:
    name: stable / bitrouter / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build bitrouter
        run: cargo build -p bitrouter

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Test bitrouter with nextest
        run: cargo nextest run --no-tests=pass -p bitrouter

  test:
    name: stable / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Test with latest nextest release
        run: cargo nextest run --all-features
