name: Publish Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: publish-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare release
    runs-on: ubuntu-latest
    outputs:
      release_needed: ${{ steps.release.outputs.release_needed }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect release commit
        id: release
        shell: bash
        run: |
          set -euo pipefail

          commit_subject="$(git log -1 --pretty=%s)"
          if [[ ! "$commit_subject" =~ ^chore\(release\):\ publish\ v ]]; then
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(sed -n 's/^version = "\(.*\)"$/\1/p' bitrouter/Cargo.toml | head -n 1)"
          if [[ -z "$version" ]]; then
            echo "Failed to read version from bitrouter/Cargo.toml" >&2
            exit 1
          fi

          version_pattern="${version//./\\.}"
          expected_subject="chore(release): publish v${version}"
          if [[ ! "$commit_subject" =~ ^chore\(release\):\ publish\ v${version_pattern}(\ \(#[0-9]+\))?$ ]]; then
            echo "Release commit subject does not match crate version." >&2
            echo "Expected: ${expected_subject} or ${expected_subject} (#<pr-number>)" >&2
            echo "Actual:   $commit_subject" >&2
            exit 1
          fi

          echo "release_needed=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=bitrouter-v$version" >> "$GITHUB_OUTPUT"

      - name: Create release tag on main
        if: steps.release.outputs.release_needed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          git fetch --force --tags

          if git rev-parse "$tag" >/dev/null 2>&1; then
            tagged_sha="$(git rev-list -n 1 "$tag")"
            if [[ "$tagged_sha" != "$GITHUB_SHA" ]]; then
              echo "Tag $tag already exists on a different commit: $tagged_sha" >&2
              exit 1
            fi
            exit 0
          fi

          git tag "$tag" "$GITHUB_SHA"
          git push origin "refs/tags/$tag"

  build:
    name: build / ${{ matrix.os }}
    needs: prepare
    if: needs.prepare.outputs.release_needed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build bitrouter
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release -p bitrouter

      - name: Package archive
        id: package
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.prepare.outputs.version }}"
          target="$(rustc -vV | sed -n 's/^host: //p')"
          stem="bitrouter-v${version}-${target}"
          dist_dir="dist/${stem}"
          mkdir -p "$dist_dir"

          binary_name="bitrouter"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            binary_name="bitrouter.exe"
          fi

          cp "target/release/${binary_name}" "$dist_dir/"
          cp README.md LICENSE CHANGELOG.md "$dist_dir/"

          archive="${stem}.tar.gz"
          tar -C dist -czf "$archive" "$stem"

          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

  publish:
    name: publish github release
    needs: [prepare, build]
    if: needs.prepare.outputs.release_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate release notes
        shell: bash
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git fetch --force --tags
          git-cliff \
            --config cliff.toml \
            --tag-pattern '^bitrouter-v[0-9].*$' \
            --latest \
            --strip header \
            --output RELEASE_NOTES.md

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          (cd dist && sha256sum ./* > SHA256SUMS.txt)

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: BitRouter v${{ needs.prepare.outputs.version }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            dist/*
