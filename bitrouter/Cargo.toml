[package]
name = "bitrouter"
version = { workspace = true }
edition = "2024"
description = "BitRouter"
authors = ["Archer <archer@bitrouter.ai>"]
license = "Apache-2.0"
repository = "https://github.com/bitrouter/bitrouter"
readme = "README.md"

[features]
default = ["tui", "sqlite", "postgres"]
tui = ["dep:ratatui", "dep:crossterm", "dep:futures", "dep:anyhow"]
sqlite = ["bitrouter-accounts/sqlite"]
postgres = ["bitrouter-accounts/postgres"]
mysql = ["bitrouter-accounts/mysql"]

[dependencies]
# Internal crates
bitrouter-accounts = { path = "../bitrouter-accounts", version = "0.3" }
bitrouter-anthropic = { path = "../bitrouter-anthropic", version = "0.3" }
bitrouter-api = { path = "../bitrouter-api", version = "0.3" }
bitrouter-config = { path = "../bitrouter-config", version = "0.3" }
bitrouter-core = { path = "../bitrouter-core", version = "0.3" }
bitrouter-google = { path = "../bitrouter-google", version = "0.3" }
bitrouter-openai = { path = "../bitrouter-openai", version = "0.3" }

# CLI
clap = { version = "4.5", features = ["derive"] }
dialoguer = "0.12"

# Runtime
dirs = "6"
reqwest = { version = "0.13", default-features = false, features = ["rustls"] }
sea-orm = { version = "1.1", default-features = false }
sea-orm-migration = { version = "1.1", default-features = false, features = [
    "runtime-tokio-rustls",
] }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0" }
thiserror = { version = "2.0" }
tokio = { version = "1", features = [
    "macros",
    "net",
    "rt-multi-thread",
    "signal",
    "sync",
    "time",
] }
tracing = { version = "0.1" }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
uuid = { version = "1", features = ["v4"] }
warp = { version = "0.4.2", features = ["server"] }

# TUI (optional)
ratatui = { version = "0.30", optional = true }
crossterm = { version = "0.29", features = ["event-stream"], optional = true }
futures = { version = "0.3", optional = true }
anyhow = { version = "1", optional = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
