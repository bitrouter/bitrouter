[package]
name = "bitrouter"
version = { workspace = true }
edition = "2024"
description = "BitRouter"
authors = ["Archer <archer@bitrouter.ai>"]
license = "Apache-2.0"
repository = "https://github.com/bitrouter/bitrouter"
readme = "README.md"

[features]
default = ["tui", "sqlite", "postgres", "swig"]
tui = ["dep:ratatui", "dep:crossterm", "dep:futures", "dep:anyhow"]
sqlite = ["bitrouter-accounts/sqlite", "bitrouter-observe/sqlite"]
postgres = ["bitrouter-accounts/postgres", "bitrouter-observe/postgres"]
mysql = ["bitrouter-accounts/mysql", "bitrouter-observe/mysql"]
swig = [
    "dep:bitrouter-swig-sdk",
    "dep:solana-client",
    "dep:solana-hash",
    "dep:solana-instruction",
    "dep:solana-keypair",
    "dep:solana-message",
    "dep:solana-pubkey",
    "dep:solana-transaction",
    "dep:spl-associated-token-account",
    "dep:bincode",
    "dep:hex",
    "dep:rand",
    "dep:x402-core",
    "dep:x402-networks",
    "x402-signer/svm",
    "x402-signer/solana-rpc",
    "x402-signer/reqwest",
    "x402-networks/svm",
]

[dependencies]
# Internal crates
bitrouter-accounts = { path = "../bitrouter-accounts", version = "0.9" }
bitrouter-anthropic = { path = "../bitrouter-anthropic", version = "0.9" }
bitrouter-api = { path = "../bitrouter-api", version = "0.9" }
bitrouter-config = { path = "../bitrouter-config", version = "0.9" }
bitrouter-core = { path = "../bitrouter-core", version = "0.9" }
bitrouter-google = { path = "../bitrouter-google", version = "0.9" }
bitrouter-guardrails = { path = "../bitrouter-guardrails", version = "0.9" }
bitrouter-observe = { path = "../bitrouter-observe", version = "0.9" }
bitrouter-openai = { path = "../bitrouter-openai", version = "0.9" }

# CLI
clap = { version = "4.5", features = ["derive"] }
dialoguer = "0.12"

# Runtime
base64 = { version = "0.22" }
dirs = "6"
reqwest = { version = "0.13", default-features = false, features = [
    "blocking",
    "json",
    "rustls",
] }
reqwest-middleware = { version = "0.5" }
sea-orm = { version = "1.1", default-features = false }
sea-orm-migration = { version = "1.1", default-features = false, features = [
    "runtime-tokio-rustls",
] }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0" }
thiserror = { version = "2.0" }
tokio = { version = "1", features = [
    "macros",
    "net",
    "rt-multi-thread",
    "signal",
    "sync",
    "time",
] }
tracing = { version = "0.1" }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
uuid = { version = "1", features = ["v4"] }
warp = { version = "0.4.2", features = ["server"] }

# TUI (optional)
ratatui = { version = "0.30", optional = true }
crossterm = { version = "0.29", features = ["event-stream"], optional = true }
futures = { version = "0.3", optional = true }
anyhow = { version = "1", optional = true }

# Embedded wallet (optional)
bitrouter-swig-sdk = { version = "0.2", optional = true }
solana-client = { version = "3.1", optional = true }
solana-hash = { version = "3.1", optional = true }
solana-instruction = { version = "3.2", optional = true }
solana-keypair = { version = "3.1", optional = true }
solana-message = { version = "3.1", optional = true }
solana-pubkey = { version = "4.1", optional = true }
solana-transaction = { version = "3.1", features = [
    "bincode",
], optional = true }
spl-associated-token-account = { version = "8.0", optional = true, default-features = false }
bincode = { version = "2.0", optional = true }
hex = { version = "0.4", optional = true }
rand = { version = "0.9", optional = true }

# X402
x402-core = { version = "2.4", optional = true }
x402-networks = { version = "2.4", default-features = false, optional = true }
x402-signer = { version = "2.4", default-features = false }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
