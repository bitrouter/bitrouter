[package]
name = "bitrouter"
version = { workspace = true }
edition = "2024"
description = "BitRouter"
authors = ["Archer <archer@bitrouter.ai>"]
license = "Apache-2.0"
repository = "https://github.com/bitrouter/bitrouter"
readme = "README.md"

[features]
default = ["tui", "sqlite", "postgres", "mpp-tempo", "mpp-solana"]
tui = ["dep:ratatui", "dep:crossterm", "dep:futures", "dep:anyhow"]
sqlite = ["bitrouter-accounts/sqlite", "bitrouter-observe/sqlite"]
postgres = ["bitrouter-accounts/postgres", "bitrouter-observe/postgres"]
mysql = ["bitrouter-accounts/mysql", "bitrouter-observe/mysql"]
mpp-tempo = [
    "bitrouter-api/mpp-tempo",
    "bitrouter-config/mpp-tempo",
    "dep:mpp",
    "dep:anyhow",
]
mpp-solana = [
    "bitrouter-api/mpp-solana",
    "bitrouter-config/mpp-solana",
    "dep:mpp",
    "dep:anyhow",
    "dep:bs58",
]

[dependencies]
# Internal crates
bitrouter-accounts = { path = "../bitrouter-accounts", version = "0.12" }
bitrouter-api = { path = "../bitrouter-api", version = "0.12" }
bitrouter-config = { path = "../bitrouter-config", version = "0.12" }
bitrouter-core = { path = "../bitrouter-core", version = "0.12" }
bitrouter-guardrails = { path = "../bitrouter-guardrails", version = "0.12" }
bitrouter-observe = { path = "../bitrouter-observe", version = "0.12" }
bitrouter-providers = { path = "../bitrouter-providers", version = "0.12" }

# CLI
clap = { version = "4.5", features = ["derive"] }
dialoguer = "0.12"

# Runtime
dirs = "6"
reqwest = { version = "0.13", default-features = false, features = [
    "blocking",
    "json",
    "rustls",
] }
reqwest-middleware = { version = "0.5" }
sea-orm = { version = "1.1", default-features = false }
sea-orm-migration = { version = "1.1", default-features = false, features = [
    "runtime-tokio-rustls",
] }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0" }
serde_yaml = { version = "0.9" }
thiserror = { version = "2.0" }
tokio = { version = "1", features = [
    "macros",
    "net",
    "rt-multi-thread",
    "signal",
    "sync",
    "time",
] }
tracing = { version = "0.1" }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
uuid = { version = "1", features = ["v4"] }
warp = { version = "0.4.2", features = ["server"] }

# TUI (optional)
ratatui = { version = "0.30", optional = true }
crossterm = { version = "0.29", features = ["event-stream"], optional = true }
futures = { version = "0.3", optional = true }
anyhow = { version = "1", optional = true }

# Embedded wallet (optional)
rand = { version = "0.9", optional = true }
solana-instruction = { version = "3.2", optional = true }
solana-pubkey = { version = "4.1", optional = true }
solana-transaction = { version = "3.1", optional = true }

# x402 payment signing
async-trait = { version = "0.1" }
http = { version = "1.4" }
solana-client = { version = "3.1" }
solana-keypair = { version = "3.1" }
x402-signer = { version = "2.5" }

# MPP payment middleware (optional)
mpp = { git = "https://github.com/tempoxyz/mpp-rs", default-features = false, features = [
    "client",
    "tempo",
    "reqwest-rustls-tls",
], optional = true }
bs58 = { version = "0.5", optional = true }
bitrouter-swig-sdk = "0.3.2"

[target.'cfg(unix)'.dependencies]
libc = "0.2"
